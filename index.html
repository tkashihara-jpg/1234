<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SES企業リスト</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #4a90e2; color: white; }
    tr:nth-child(even) { background: #f5f5f5; }
    .btn { padding: 10px 20px; margin: 10px 5px; cursor: pointer;
           background: #4a90e2; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>SES営業リスト 企業一覧</h1>
  <button class="btn" onclick="location.href='/scrape'">🔍 スクレイピング実行</button>
  <button class="btn" onclick="location.href='/export'">📥 Excel出力</button>

  {% if message %}<p>✅ {{ message }}</p>{% endif %}

  {% if companies %}
  <p>{{ companies|length }}社</p>
  <table>
    <tr><th>#</th><th>企業名</th><th>URL</th></tr>
    {% for c in companies %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ c.企業名 }}</td>
      <td><a href="{{ c.URL }}" target="_blank">{{ c.URL }}</a></td>
    </tr>
    {% endfor %}
  </table>
  {% endif %}
</body>
</html>
